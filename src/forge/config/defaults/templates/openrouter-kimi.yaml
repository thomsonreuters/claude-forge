# Template: openrouter-kimi
# Kimi models via OpenRouter (direct, no LiteLLM)
#
# Haiku uses Gemma 4 31B as a shared low-cost multimodal tier. Sonnet/opus use
# Kimi K2.6 as the higher-capability Kimi tier. K2.5 is available as a
# sonnet/opus model_alternative for explicit proxy requests.
# Requires OPENROUTER_API_KEY in .env (or environment).

proxy:
  preferred_provider: openrouter
  default_port: 8102

  openrouter:
    tiers:
      haiku: google/gemma-4-31b-it
      sonnet: moonshotai/kimi-k2.6
      opus: moonshotai/kimi-k2.6
    model_alternatives:
      sonnet:
        kimi-k2.5: moonshotai/kimi-k2.5
      opus:
        kimi-k2.5: moonshotai/kimi-k2.5
    tier_overrides:
      sonnet:
        reasoning_effort: high
      opus:
        reasoning_effort: high
    base_url: "https://openrouter.ai/api/v1"
    error_hints: true
