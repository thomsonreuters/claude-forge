# Template: openrouter-qwen
# Qwen models via OpenRouter (direct, no LiteLLM)
#
# Haiku uses Qwen3.6 Flash for fast multimodal work. Sonnet uses Qwen3.6 Plus.
# Opus uses Qwen3.6 Max Preview for the strongest current Qwen tier.
# qwen3-coder is available as a model_alternative for explicit proxy requests.
# Requires OPENROUTER_API_KEY in .env (or environment).

proxy:
  family: qwen
  preferred_provider: openrouter
  default_port: 8101

  openrouter:
    tiers:
      haiku: qwen/qwen3.6-flash
      sonnet: qwen/qwen3.6-plus
      opus: qwen/qwen3.6-max-preview
    model_alternatives:
      sonnet:
        qwen3-coder: qwen/qwen3-coder
      opus:
        qwen3-coder: qwen/qwen3-coder
    base_url: "https://openrouter.ai/api/v1"
    error_hints: true
